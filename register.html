<!DOCTYPE html>
<html>
<head>
<title>Create Account</title>

<style>
body{
font-family:Arial;
background:#f2f2f2;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-box{
background:white;
padding:30px;
border-radius:10px;
width:300px;
text-align:center;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

input{
width:90%;
padding:10px;
margin:10px;
}

button{
padding:10px 20px;
background:#007BFF;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}
</style>

</head>

<body>

<div class="login-box">

<h2>Create Account</h2>

<form onsubmit="register(); return false;">

<input type="text" id="newuser" placeholder="Username" required>

<input type="password" id="newpass" placeholder="Password" required>

<button type="submit">Register</button>

</form>

<p id="msg"></p>

<a href="login.html">Back to Login</a>

</div>

<script src="script.js"></script>

</body>
</html>
